<svg viewBox="0 0 720 420" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" role="img" aria-label="Summer tennis outfit checklist">
  <rect x="0" y="0" width="720" height="420" fill="#ffffff"/>
  <text x="36" y="42" font-size="24" font-weight="700" fill="#1a1a1a">Summer Tennis Outfit — Checklist</text>
  <text x="36" y="65" font-size="14" fill="#6b7280">Cute and sweat-proof, from fabric to sunscreen</text>
  <!-- rule 1 fabric -->
  <rect x="36" y="86" width="648" height="52" rx="10" fill="#f2f8f4" stroke="#d7e6dc"/>
  <text x="52" y="110" font-size="15" font-weight="700" fill="#1f6f43">① Fabric beats everything</text>
  <text x="52" y="129" font-size="12.5" fill="#4b5563">Moisture-wicking &amp; breathable — skip cotton, it holds sweat like a grudge</text>
  <!-- dress vs set -->
  <rect x="36" y="150" width="315" height="66" rx="10" fill="#f7f4ee" stroke="#e6ddcb"/>
  <text x="52" y="174" font-size="14" font-weight="700" fill="#8a6d3b">The Dress</text>
  <text x="52" y="194" font-size="12" fill="#6b5a3e">One-and-done, built-in shorts,</text>
  <text x="52" y="209" font-size="12" fill="#6b5a3e">zero decisions</text>
  <rect x="369" y="150" width="315" height="66" rx="10" fill="#f7f4ee" stroke="#e6ddcb"/>
  <text x="385" y="174" font-size="14" font-weight="700" fill="#8a6d3b">The Two-Piece Set</text>
  <text x="385" y="194" font-size="12" fill="#6b5a3e">Mix-and-match, flexible,</text>
  <text x="385" y="209" font-size="12" fill="#6b5a3e">more control</text>
  <!-- colors -->
  <rect x="36" y="228" width="648" height="46" rx="10" fill="#f2f8f4" stroke="#d7e6dc"/>
  <text x="52" y="256" font-size="13.5" fill="#4b5563"><tspan font-weight="700" fill="#1f6f43">Colors:</tspan>  white &amp; pastels stay coolest — avoid heavy dark shades on the hottest days</text>
  <!-- supporting cast -->
  <text x="36" y="298" font-size="15" font-weight="700" fill="#1a1a1a">Don't forget the supporting cast</text>
  <g font-size="12.5" fill="#1a1a1a">
    <rect x="36" y="310" width="156" height="34" rx="8" fill="#fff" stroke="#cfe3d6"/><text x="52" y="331">✓ Supportive bra</text>
    <rect x="200" y="310" width="156" height="34" rx="8" fill="#fff" stroke="#cfe3d6"/><text x="216" y="331">✓ Visor or cap</text>
    <rect x="364" y="310" width="156" height="34" rx="8" fill="#fff" stroke="#cfe3d6"/><text x="380" y="331">✓ Tennis shoes</text>
    <rect x="528" y="310" width="156" height="34" rx="8" fill="#fff" stroke="#cfe3d6"/><text x="544" y="331">✓ Light layer</text>
  </g>
  <rect x="36" y="356" width="648" height="34" rx="8" fill="#fff6e6" stroke="#f2dca6"/>
  <text x="360" y="378" font-size="13.5" font-weight="700" fill="#b5791a" text-anchor="middle">☀ The one thing people skip: sweat-resistant SPF — reapply between sets</text>
</svg>